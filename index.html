<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Экзамены</title>

<link rel="stylesheet" href="style.css">
<script>
// Убедимся, что используется правильная кодировка
if (document.characterSet !== 'UTF-8' && document.characterSet !== 'utf-8') {
  console.warn('Warning: Page encoding is', document.characterSet, 'but should be UTF-8');
}
</script>
</head>
<body>

<div class="container">

<h1>Экзаменационная система</h1>
<p class="subtitle">Выбери тему и начни тестирование — отличная тренировка перед экзаменом.</p>

<div id="menu" class="menu-container">
    <button onclick="loadExam('informatics')">
        📚 Информатика
    </button>

    <button onclick="loadExam('programming')">
        💻 Алгоритмдеу және бағдарламалау
    </button>
</div>

<div id="nameForm" style="display:none" class="form-container">
    <h2>Заполни данные</h2>
    <input type="text" id="userName" placeholder="Введи своё имя" maxlength="100">
    <button onclick="startQuiz()" class="btn-start">Начать тест 🚀</button>
    <button onclick="backToMenu()" class="btn-back">← Назад</button>
</div>

<div id="quiz" style="display:none" class="quiz-container">

<div class="quiz-header">
    <div>Вопрос <span id="current">1</span>/<span id="total">0</span></div>
    <div>Баллов: <span id="scoreShow">0</span></div>
    <div>🔥 Стрик: <span id="streak">0</span></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<div class="quiz-buttons">
    <button id="backBtn" onclick="previousQuestion()" class="btn-back">← Назад</button>
    <button id="nextBtn">Следующий →</button>
    <button id="exitBtn" onclick="backToMenu()" class="btn-exit">🚪 Выход</button>
</div>

<p id="progress"></p>

</div>

<div id="results" style="display:none" class="results-container">
    <div class="result-card">
        <h2>🎉 Тест завершён!</h2>
        <div class="result-info">
            <p><strong>Имя:</strong> <span id="resultName"></span></p>
            <p><strong>Баллы:</strong> <span id="resultScore"></span> / <span id="resultTotal"></span></p>
            <p><strong>Процент:</strong> <span id="resultPercent"></span>%</p>
            <p><strong>Макс стрик:</strong> 🔥 <span id="resultStreak"></span></p>
        </div>
        <div id="wrongAnswersSection" style="display:none">
            <h3>❌ Вопросы на ошибки:</h3>
            <button onclick="reviewWrong()" class="btn-review">Повторить неправильные ответы 📝</button>
        </div>
        <button onclick="backToMenu()" class="btn-restart">← Вернуться в меню</button>
        <button onclick="retakeExam()" class="btn-retake">🔄 Пройти ещё раз</button>
    </div>
</div>

</div>

<script>
// Загружаем файл как текст, выполняем в локальном скоупе через Function,
// возвращаем локальную переменную `questions` и записываем её в указанный глобальный слот.
function loadAndExtract(src, assignName) {
    return fetch(src)
        .then(function(res){ if(!res.ok) throw new Error('fetch failed'); return res.text(); })
        .then(function(text){
            try {
                var fn = new Function(text + '\nreturn (typeof questions !== "undefined") ? questions : [];');
                var q = fn();
                window[assignName] = Array.isArray(q) ? q : [];
            } catch(e) {
                window[assignName] = [];
            }
        })
        .catch(function(){ window[assignName]=[]; });
}

loadAndExtract('data/informatics.js','questions_informatics')
    .then(function(){ return loadAndExtract('data/programming.js','questions_programming'); })
    .then(function(){
        var s = document.createElement('script');
        s.src = 'script.js';
        document.body.appendChild(s);
    });
</script>

</body>
</html>
